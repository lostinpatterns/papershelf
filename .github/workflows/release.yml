name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag, package, and changelog
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must be stable semver tags like v1.2.3."
            exit 1
          fi

          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "$package_version" != "$version" ]]; then
            echo "::error::package.json version is $package_version, expected $version from tag $tag."
            exit 1
          fi

          if ! grep -Fxq "## $version" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must include a '## $version' section."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Lint, format, types
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Check package contents
        run: npm pack --dry-run

  publish-npm:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --provenance --access public

  github-release:
    name: Create GitHub Release
    needs: [validate, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract release notes
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          heading = f"## {version}"

          start = None
          for index, line in enumerate(lines):
              if line.strip() == heading:
                  start = index + 1
                  break

          if start is None:
              raise SystemExit(f"CHANGELOG.md is missing {heading!r}")

          end = len(lines)
          for index in range(start, len(lines)):
              if lines[index].startswith("## "):
                  end = index
                  break

          notes = "\n".join(lines[start:end]).strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md section {heading!r} has no release notes")

          Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md --verify-tag
